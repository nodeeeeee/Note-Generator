<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>AutoNote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Left navigation rail -->
  <nav id="rail">
    <div class="rail-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4DD0E1" stroke-width="1.8">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      <span class="rail-logo-text">AUTO<br>NOTE</span>
    </div>
    <div id="nav-items"></div>
  </nav>

  <!-- Main content area -->
  <div id="content-area">
    <!-- Scrollable page content -->
    <div id="page-content"></div>

    <!-- Pinned terminal panel -->
    <div id="terminal-panel">
      <div class="terminal-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4DD0E1" stroke-width="2">
          <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
        <span class="terminal-title"> Output</span>
        <span id="term-status" class="term-status"></span>
        <div class="flex-grow"></div>
        <button id="term-stop"  class="term-btn stop-btn"  title="Stop process" style="display:none">&#9632;</button>
        <button id="term-clear" class="term-btn clear-btn" title="Clear output">&#10006;</button>
      </div>
      <div id="terminal-output"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
